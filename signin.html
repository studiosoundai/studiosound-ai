<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — StudioSound.ai</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/iconfont/tabler-icons.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--neon:#00FFD1;--bg:#07070f;--border:#2a2a3a;--text:#ffffff;--muted:#c0c0d8;}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;}
.page{display:flex;height:100vh;}
.left{width:480px;flex-shrink:0;background:var(--bg);padding:48px;display:flex;flex-direction:column;justify-content:center;overflow-y:auto;}
.auth-logo{display:flex;align-items:center;gap:8px;margin-bottom:36px;text-decoration:none;}
.auth-logoimg{height:42px;width:auto;max-width:140px;border-radius:9px;object-fit:contain;display:block;}
.auth-logoname{font-size:15px;font-weight:800;color:#fff;}
.auth-title{font-size:30px;font-weight:900;letter-spacing:-0.03em;margin-bottom:8px;color:#fff;}
.auth-sub{color:var(--muted);font-size:13px;font-weight:500;margin-bottom:32px;line-height:1.6;}
.form-group{margin-bottom:16px;}
.form-label{color:#e0e0f0;font-size:12px;font-weight:700;margin-bottom:6px;display:block;}
.form-input{width:100%;background:#0f0f1a;border:0.5px solid var(--border);border-radius:10px;padding:12px 14px;color:#fff;font-size:13px;outline:none;transition:border 0.15s;font-family:'Sora',sans-serif;}
.form-input:focus{border-color:var(--neon);background:#121220;}
.form-input::placeholder{color:#5a5a72;}
.forgot{text-align:right;margin-top:-10px;margin-bottom:20px;}
.forgot a{color:var(--neon);font-size:11px;font-weight:600;cursor:pointer;text-decoration:none;}
.forgot a:hover{text-decoration:underline;}
.btn-submit{width:100%;background:var(--neon);color:#05050a;border:none;border-radius:10px;padding:14px;font-size:14px;font-weight:800;cursor:pointer;font-family:'Sora',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;transition:transform 0.15s;}
.btn-submit:hover{transform:scale(1.02);}
.auth-footer{text-align:center;margin-top:24px;color:var(--muted);font-size:13px;font-weight:500;}
.auth-footer a{color:var(--neon);font-weight:700;cursor:pointer;text-decoration:none;}
.right{flex:1;position:relative;overflow:hidden;}
.right-img{width:100%;height:100%;object-fit:cover;display:block;}
.right-overlay{position:absolute;inset:0;background:linear-gradient(to right,rgba(7,7,15,0.6),rgba(7,7,15,0.05));}
.right-content{position:absolute;bottom:40px;left:40px;right:40px;}
.right-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(0,255,209,0.2);border:0.5px solid var(--neon);border-radius:20px;padding:6px 14px;font-size:11px;color:var(--neon);font-weight:700;margin-bottom:14px;}
.right-quote{font-size:22px;font-weight:800;color:#fff;line-height:1.3;letter-spacing:-0.02em;max-width:320px;margin-bottom:10px;text-shadow:0 2px 20px rgba(0,0,0,0.5);}
.right-attr{color:rgba(255,255,255,0.7);font-size:12px;font-weight:500;}
@media(max-width:768px){
.right{display:none;}
.left{width:100%;padding:32px 24px;}
body{overflow-y:auto;}
}
</style>
</head>
<body>
<div class="page">
  <div class="left">
    <a class="auth-logo" href="index.html">
      <img class="auth-logoimg" src="https://raw.githubusercontent.com/studiosoundai/studiosound-ai/main/fox-side-logo.png.png" alt="StudioSound.ai"/>
      <span class="auth-logoname">StudioSound.ai</span>
    </a>
    <div class="auth-title">Welcome back</div>
    <div class="auth-sub">Sign in to your StudioSound.ai account and keep creating.</div>
    <div class="form-group"><label class="form-label">Email Address</label><input class="form-input" placeholder="you@email.com" type="email"/></div>
    <div class="form-group"><label class="form-label">Password</label><input class="form-input" placeholder="Your password" type="password"/></div>
    <div class="forgot"><a href="#">Forgot your password?</a></div>
    <button class="btn-submit" onclick="window.location.href='index.html'"><i class="ti ti-login"></i> Sign In to StudioSound</button>
    <div class="auth-footer">Don't have an account? <a href="signup.html">Sign up free →</a></div>
  </div>
  <div class="right">
    <img class="right-img" src="https://raw.githubusercontent.com/studiosoundai/studiosound-ai/main/studio-sound-sign-in.png.png" alt="StudioSound.ai — AI generated artwork"/>
    <div class="right-overlay"></div>
    <div class="right-content">
      <div class="right-badge"><i class="ti ti-sparkles"></i> AI Generated on StudioSound.ai</div>
      <div class="right-quote">"Talent should be the only barrier to success in music."</div>
      <div class="right-attr">StudioSound.ai — Create. Release. Elevate.</div>
    </div>
  </div>
</div>
</body>
</html>
